<title>2026 CFB Season Preview — HefML</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#BA7517;--gm:#EF9F27;
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --b:rgba(255,255,255,0.07);--bm:rgba(255,255,255,0.13);
  --tx:#f0ede8;--tx2:#9a9690;--tx3:#5c5a56;
  --win:#3B6D11;--wt:#C0DD97;--loss:#791F1F;--lt:#F09595;
  --mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
  --sw:240px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column}

/* HEADER */
.hdr{flex-shrink:0;border-bottom:1px solid var(--b);padding:1rem 1.25rem;display:flex;align-items:center;gap:1.5rem;position:relative}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gm),transparent)}
.hdr-logo{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.15em;white-space:nowrap}
.hdr-title{font-size:18px;font-weight:300;color:var(--tx);letter-spacing:-.02em}
.hdr-title span{color:var(--gm);font-weight:500}
.hdr-search{margin-left:auto;position:relative}
.hdr-search input{background:var(--bg3);border:.5px solid var(--b);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:11px;padding:6px 10px 6px 28px;width:200px;outline:none;transition:border-color .15s}
.hdr-search input:focus{border-color:var(--bm)}
.hdr-search input::placeholder{color:var(--tx3)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:11px;pointer-events:none}
.search-drop{position:absolute;top:calc(100% + 4px);right:0;width:260px;background:var(--bg3);border:.5px solid var(--bm);border-radius:6px;max-height:300px;overflow-y:auto;z-index:100;display:none}
.search-drop.open{display:block}
.sd-item{padding:7px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--tx)}
.sd-item:hover{background:var(--bg4)}
.sd-item .sd-conf{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.sd-item .sd-rec{font-family:var(--mono);font-size:10px;color:var(--tx2)}

/* LAYOUT */
.body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;border-right:.5px solid var(--b);overflow-y:auto;background:var(--bg2)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.nc{border-bottom:.5px solid var(--b)}
.nct{width:100%;text-align:left;background:none;border:none;color:var(--tx2);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.nct:hover{color:var(--tx);background:var(--bg3)}
.nca{color:var(--tx3);font-size:9px}
.nts{display:flex;flex-direction:column}
.nts:not(.open){display:none}
.nt{background:none;border:none;text-align:left;width:100%;padding:5px 12px 5px 16px;color:var(--tx2);font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.nt:hover{background:var(--bg3);color:var(--tx)}
.nt.active{background:rgba(186,117,23,.12);color:var(--gold);font-weight:500}
.nr{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-left:6px}
.nt.active .nr{color:var(--gold)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:1.5rem 2rem}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* LANDING */
.landing{max-width:900px}
.landing-title{font-size:32px;font-weight:300;color:var(--tx);letter-spacing:-.02em;margin-bottom:.5rem}
.landing-title span{color:var(--gm);font-weight:500}
.landing-sub{color:var(--tx2);font-size:13px;margin-bottom:2rem}
.stat-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.sb{background:var(--bg2);border:.5px solid var(--b);border-radius:8px;padding:.9rem 1rem}
.sb .sl{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:3px}
.sb .sv{font-size:24px;font-weight:300;color:var(--tx)}
.sb .sn{font-size:11px;color:var(--tx2);margin-top:2px}
.conf-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.cg-card{background:var(--bg2);border:.5px solid var(--b);border-radius:8px;padding:.9rem 1rem}
.cg-title{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:.5px solid var(--b)}
.cg-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;cursor:pointer}
.cg-row:hover .cg-name{color:var(--gm)}
.cg-name{color:var(--tx)}
.cg-name.top{font-weight:500;color:var(--gm)}
.cg-rec{font-family:var(--mono);font-size:11px;color:var(--tx2)}
.cg-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:2px}
.cg-fill{height:2px;background:var(--gold);border-radius:1px}
.section-hd{display:flex;align-items:baseline;gap:.75rem;margin:1.5rem 0 1rem;padding-bottom:.5rem;border-bottom:.5px solid var(--bm)}
.section-hd h2{font-size:12px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);white-space:nowrap}
.section-hd .rule{flex:1;height:.5px;background:var(--b)}

/* SCHEDULE VIEW */
.sched-view{max-width:860px}
.sv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:.5px solid var(--b);flex-wrap:wrap;gap:.75rem}
.sv-team{font-size:28px;font-weight:300;color:var(--tx);letter-spacing:-.02em}
.sv-meta{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-top:.25rem}
.sv-rec{font-family:var(--mono);font-size:20px;color:var(--gm)}
.sv-sp{font-family:var(--mono);font-size:13px}
.sv-conf{font-family:var(--mono);font-size:11px;color:var(--tx3);margin-top:2px}
.back-btn{background:none;border:.5px solid var(--b);border-radius:5px;color:var(--tx2);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;white-space:nowrap;align-self:flex-start}
.back-btn:hover{border-color:var(--bm);color:var(--tx)}

.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table thead tr{border-bottom:.5px solid var(--bm)}
.sched-table th{text-align:left;color:var(--tx3);font-weight:400;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 8px}
.sched-table td{padding:7px 8px;border-bottom:.5px solid var(--b);color:var(--tx);vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.sched-table tr:hover td{background:var(--bg3)}
.tw{font-family:var(--mono);color:var(--tx3);width:24px;font-size:11px}
.tl{font-family:var(--mono);font-size:11px;width:18px;text-align:center}
.tc{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.tm{font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap}
.mp{color:#97C459}.mn{color:#F09595}.mc{color:var(--gold)}
.tp{width:110px}
.pbw{display:flex;align-items:center;gap:5px}
.pbb{flex:1;height:3px;background:var(--bg4);border-radius:2px}
.pbf{height:3px;border-radius:2px}
.pw{background:#639922}.pl{background:#A32D2D}
.pv{font-family:var(--mono);font-size:10px;color:var(--tx3);min-width:32px;text-align:right}
.tr{width:30px;text-align:center}
.rw{display:inline-block;background:var(--win);color:var(--wt);font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px}
.rl{display:inline-block;background:var(--loss);color:var(--lt);font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px}
.b10t{display:inline-block;background:rgba(186,117,23,.1);color:var(--gold);font-size:9px;font-family:var(--mono);padding:1px 4px;border-radius:2px;margin-left:4px;vertical-align:middle}

/* conf browse */
.conf-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:1.5rem}
.ctc{background:var(--bg2);border:.5px solid var(--b);border-radius:7px;padding:.7rem .85rem;cursor:pointer;transition:border-color .12s}
.ctc:hover{border-color:var(--bm)}
.ctc .cn{font-size:13px;font-weight:400;color:var(--tx)}
.ctc .cr{font-family:var(--mono);font-size:18px;color:var(--gm);margin-top:2px}
.ctc .cs{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:1px}

@media(max-width:700px){
  :root{--sw:0px}
  .sidebar{display:none}
  .stat-strip{grid-template-columns:repeat(2,1fr)}
  .conf-grid{grid-template-columns:1fr}
}
</style>

const CONF_ORDER=['SEC','Big Ten','Big 12','ACC','Pac-12','Mountain West','American Athletic','Sun Belt','Mid-American','Conference USA','FBS Independents'];
const CONF_ABBR={'SEC':'SEC','Big Ten':'B10','Big 12':'B12','ACC':'ACC','Pac-12':'P12','Mountain West':'MWC','American Athletic':'AAC','Sun Belt':'SBC','Mid-American':'MAC','Conference USA':'CUSA','FBS Independents':'Ind'};
const ALL_TEAMS=Object.keys(S).sort();

let currentTeam=null;

function spColor(s){return s>=20?'#97C459':s>=10?'#EF9F27':s>=0?'#9a9690':'#F09595'}

function confColor(c){
  const m={'SEC':'#7F77DD','Big Ten':'#1D9E75','Big 12':'#D85A30','ACC':'#D4537E','Pac-12':'#378ADD','Mountain West':'#BA7517','American Athletic':'#639922','Sun Belt':'#888780','Mid-American':'#EF9F27','Conference USA':'#5DCAA5','FBS Independents':'#B4B2A9'};
  return m[c]||'#9a9690';
}

function toggleConf(btn,id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
}

function setActive(team){
  document.querySelectorAll('.nt.active').forEach(b=>b.classList.remove('active'));
  const tid='t'+(team.replace(/[^a-zA-Z0-9]/g,'')); 
  const btn=document.getElementById(tid);
  if(btn){btn.classList.add('active');btn.scrollIntoView({block:'nearest'})}
}

function showTeam(team){
  currentTeam=team;
  setActive(team);
  const d=S[team];
  if(!d){document.getElementById('content').innerHTML='<p style="color:var(--tx2)">Not found.</p>';return}
  const sp=d.s,spStr=(sp>0?'+':'')+sp;
  const conf=d.c;

  const rows=d.g.map(g=>{
    const loc=g.n?'N':(g.h?'H':'@');
    const locCol=g.n?'var(--tx2)':(g.h?'var(--gold)':'var(--tx3)');
    const mStr=(g.m>0?'+':'')+g.m.toFixed(1);
    const abs=Math.abs(g.m);
    const mCls=g.r==='W'?(abs>2?'mp':'mc'):(abs>2?'mn':'mc');
    const bw=Math.min(100,Math.max(2,g.p)).toFixed(0);
    const bCls=g.r==='W'?'pw':'pl';
    const badge=g.r==='W'?'<span class="rw">W</span>':'<span class="rl">L</span>';
    const confTag=g.oc===conf?`<span class="b10t">${CONF_ABBR[conf]||conf.slice(0,3)}</span>`:'';
    const oSp=S[g.o]?((S[g.o].s>0?'+':'')+S[g.o].s):'';
    return`<tr>
      <td class="tw">${g.w}</td>
      <td class="tl" style="color:${locCol}">${loc}</td>
      <td><span style="cursor:pointer;color:var(--tx)" onclick="showTeam('${g.o.replace(/'/g,"\'")}')"><span style="border-bottom:.5px solid transparent" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gm)'" onmouseout="this.style.borderColor='transparent';this.style.color='var(--tx)'">${g.o}</span></span>${confTag}</td>
      <td class="tc">${g.oc}</td>
      <td class="tm ${mCls}">${mStr}</td>
      <td class="tp"><div class="pbw"><div class="pbb"><div class="pbf ${bCls}" style="width:${bw}%"></div></div><span class="pv">${g.p.toFixed(1)}%</span></div></td>
      <td class="tr">${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="sched-view">
      <div class="sv-hdr">
        <div>
          <div class="sv-team">${team}</div>
          <div class="sv-conf" style="color:${confColor(conf)}">${conf}</div>
          <div class="sv-meta">
            <span class="sv-rec">${d.w}-${d.l}</span>
            <span class="sv-sp" style="color:${spColor(sp)}">SP+ ${spStr}</span>
          </div>
        </div>
        <button class="back-btn" onclick="showLanding()">← All teams</button>
      </div>
      <table class="sched-table">
        <thead><tr>
          <th>Wk</th><th></th><th>Opponent</th><th>Conf</th>
          <th style="text-align:right">Proj margin</th><th>Win prob</th><th>Proj</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  document.getElementById('mainArea').scrollTop=0;
}

function showConf(conf){
  const teams=ALL_TEAMS.filter(t=>S[t].c===conf).sort((a,b)=>S[b].w-S[a].w||S[a].l-S[b].l);
  const cards=teams.map(t=>{
    const d=S[t];
    const sp=(d.s>0?'+':'')+d.s;
    return`<div class="ctc" onclick="showTeam('${t.replace(/'/g,"\'")}')">
      <div class="cn">${t}</div>
      <div class="cr">${d.w}-${d.l}</div>
      <div class="cs">SP+ ${sp}</div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div class="section-hd"><h2>${conf}</h2><div class="rule"></div></div>
    <div class="conf-team-grid">${cards}</div>`;
  document.getElementById('mainArea').scrollTop=0;
}

function showLanding(){
  currentTeam=null;
  document.querySelectorAll('.nt.active').forEach(b=>b.classList.remove('active'));

  // Build conf standings cards
  const confCards=CONF_ORDER.map(conf=>{
    const teams=ALL_TEAMS.filter(t=>S[t].c===conf).sort((a,b)=>S[b].w-S[a].w||S[a].l-S[b].l);
    const maxW=teams[0]?S[teams[0]].w:1;
    const rows=teams.slice(0,6).map((t,i)=>{
      const d=S[t];
      const pct=Math.round(d.w/maxW*100);
      return`<div class="cg-row" onclick="showTeam('${t.replace(/'/g,"\'")}')">
        <span class="cg-name ${i===0?'top':''}">${t}</span>
        <span class="cg-rec">${d.w}-${d.l}</span>
      </div>
      <div class="cg-bar"><div class="cg-fill" style="width:${pct}%"></div></div>`;
    }).join('');
    const moreCount=teams.length-6;
    const moreLink=moreCount>0?`<div style="font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:6px;cursor:pointer" onclick="showConf('${conf}')">+${moreCount} more →</div>`:'';
    return`<div class="cg-card">
      <div class="cg-title" style="cursor:pointer" onclick="showConf('${conf}')">${conf}</div>
      ${rows}${moreLink}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="landing">
      <div class="landing-title">2026 College Football <span>Season Preview</span></div>
      <div class="landing-sub">HefML model · CatBoost + particle filter · 569 games · 126 teams · Weeks 1–13 · Click any team to view their full projected schedule</div>
      <div class="stat-strip">
        <div class="sb"><div class="sl">games modeled</div><div class="sv">569</div><div class="sn">Weeks 1–13, FBS</div></div>
        <div class="sb"><div class="sl">teams</div><div class="sv">126</div><div class="sn">All FBS programs</div></div>
        <div class="sb"><div class="sl">undefeated projections</div><div class="sv">3</div><div class="sn">OSU · Georgia · Notre Dame</div></div>
        <div class="sb"><div class="sl">biggest margin</div><div class="sv">57.8</div><div class="sn">OSU vs Ball State, Wk 1</div></div>
      </div>
      <div class="section-hd"><h2>Projected Conference Standings</h2><div class="rule"></div></div>
      <div class="conf-grid">${confCards}</div>
    </div>`;
  document.getElementById('mainArea').scrollTop=0;
}

// Search
function handleSearch(val){
  const drop=document.getElementById('searchDrop');
  if(!val||val.length<1){drop.classList.remove('open');return}
  const q=val.toLowerCase();
  const matches=ALL_TEAMS.filter(t=>t.toLowerCase().includes(q)).slice(0,12);
  if(!matches.length){drop.classList.remove('open');return}
  drop.innerHTML=matches.map(t=>{
    const d=S[t];
    return`<div class="sd-item" onmousedown="showTeam('${t.replace(/'/g,"\'")}');document.getElementById('searchInput').value='';closeDrop()">
      <span>${t}</span>
      <span style="display:flex;gap:8px"><span class="sd-conf">${CONF_ABBR[d.c]||d.c}</span><span class="sd-rec">${d.w}-${d.l}</span></span>
    </div>`;
  }).join('');
  drop.classList.add('open');
}

function closeDrop(){
  document.getElementById('searchDrop').classList.remove('open');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeDrop();
  if((e.key==='k'&&e.metaKey)||(e.key==='k'&&e.ctrlKey)){
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// Init
showLanding();
</script>
</body>
